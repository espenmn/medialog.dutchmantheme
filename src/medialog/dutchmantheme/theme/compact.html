<body class="d-flex flex-column h-100">
  <section id="portal-toolbar"></section>
  <div class="outer-wrapper flex-shrink-0">
    <header id="content-header"
      class="container d-flex pt-3 flex-column justify-content-between align-items-lg-start flex-lg-row">


      <div id="portal-logo-wrapper"
        class="pb-3 d-flex justify-content-between align-items-center order-lg-first w-auto">
        <div id="portal-logo" class="order-lg-0"></div>
        <div class="navbar navbar-expand-lg">
          <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="offcanvas"
            data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar">
            <span class="navbar-toggler-icon "></span>
          </button>
        </div>

      </div>

      <div id="mainnavigation-wrapper">
        <div id="mainnavigation">
          <nav class="navbar navbar-expand-lg navbar-barceloneta pat-navigationmarker" id="portal-globalnav-wrapper">
            <div class="container">
              <div class="offcanvas offcanvas-end " tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header justify-content-end">
                  <button type="button" class="btn-close btn-close-white text-reset" data-bs-dismiss="offcanvas"
                    aria-label="Close"></button>
                </div>
                <div class="offcanvas-body align-items-center">
                  <ul class="navbar-nav me-auto" id="portal-globalnav">
                  </ul>
                  <a href="contact" class="phonebutton btn btn-primary xl:flex xhiddenonmobile">

                    </svg>&nbsp;<b>Neem contact met ons op</b>
                  </a>
                </div>
              </div>
            </div>
          </nav>

        </div>
      </div>
    </header>


    <div id="above-content-wrapper">
      <div id="above-content"></div>
    </div>
    <div class="container">
      <div class="row">
        <aside id="global_statusmessage" class="col-12"></aside>
      </div>
      <main id="main-container" class="row">
        <section id="portal-column-content">
        </section>
        <aside id="portal-column-one">
        </aside>
        <aside id="portal-column-two" role="complementary">
        </aside>
      </main>
    </div>



    <div id="below-portlets-wrapper-div">
      <div id="below-portlets-wrapper"></div>
    </div>

    <footer id="portal-footer-wrapper" class="mt-auto">
      <div class="container" id="portal-footer">
        <div class="doormat row"></div>
        <div class="copyright row">
          <div class="col-12"></div>
        </div>
        <div class="colophon row">
          <div class="col-12"></div>
        </div>
        <div class="site-actions row">
          <div class="col-12"></div>
        </div>
      </div>
    </footer>

  </div> <!--/outer-wrapper -->

  <style>
    nav.navbar-barceloneta,
    #portal-globalnav {
      font-weight: bold;
      list-style: none;
      background: none !important;
      --bs-navbar-background: none;

    }

    #mainnavigation-wrapper #portal-globalnav a {
      border-bottom: 2px solid transparent;
      font-size: 150%;
      font-family: Arial, Helvetica, sans-serif;
      color: #777;
    }

    #portal-globalnav a:hover {
      border-color: inherit;
    }

    #mainnavigation-wrapper .phonebutton {
      color: white;
      stroke: white;
      border-radius: 12px;
      padding: 10px 20px;
      font-family: Arial, Helvetica, sans-serif;
      margin-left: 50px;
    }

    @media (max-width: 800px) {
      .phonebutton {
        width: 100%
      }
    }
  </style>
</body>

</html>
